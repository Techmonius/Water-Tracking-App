<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#eaf7ff"><title>Water Tracker v1</title><link rel="stylesheet" href="v1/css/app.css"></head>
<body><main class="app">
<header class="top"><div><p class="tiny">Today</p><h1>Water Tracker</h1></div><button id="settingsButton" class="gear">⚙️</button></header>
<section id="homeView" class="view active">
<section id="hero" class="hero"><div class="total"><span id="todayTotal" class="num">0</span><span class="goal">/ <span id="todayGoal">120</span> oz</span></div><div id="progressText" class="status">0% complete</div><div class="bottleArea"><div class="bottle"><div class="mark"></div><div id="water" class="water"></div><div class="shine"></div></div></div><div id="quickButtons" class="grid"></div></section>
<section class="card"><div class="row"><h2>My Cups</h2><button id="addCupButton" class="small">+ Add Cup</button></div><div id="cupButtons" class="cups"></div><p class="hint">Tap a cup to log it. Press and hold a cup to edit it.</p></section>
<button id="undoButton" class="undo">↶ Undo last drink</button>
<div class="utilityActions"><button id="resetButton" class="ghost danger">Reset Today</button><button id="restoreButton" class="ghost">Restore Today</button></div>
<section class="card"><div class="row"><h2>Your Plant</h2><span id="plantName" class="avg">Seed</span></div><div id="plantBox" class="plant"></div></section>
<section class="card"><div class="row"><h2>Progress</h2><span id="levelText" class="avg">Level 1</span></div><div class="levelbar"><div id="levelFill"></div></div><div id="todayWins" class="wins"></div><button id="badgesButton" class="small">All Badges</button></section>
<section class="card"><div class="row"><h2>Last 7 Days</h2><span id="weeklyAverage" class="avg"></span></div><div id="history" class="history"></div></section>
<section class="card"><div class="row"><h2>This Month</h2><span class="avg">Tap a day to edit</span></div><div id="monthWeekdays" class="monthWeekdays"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div><div id="monthGrid" class="monthGrid"></div></section>
<section class="card"><div class="row"><h2>Today’s Drinks</h2><button id="customButton" class="small">+ Custom</button></div><div id="timeline" class="timeline show"></div></section>
<div class="pageLinks"><button data-view="statsView" class="small">Statistics</button><button data-view="badgesView" class="small">Achievements</button></div>
</section>
<section id="statsView" class="view"><section class="card"><div class="row"><h2>Statistics</h2><button data-view="homeView" class="small">Done</button></div><div id="stats" class="statsGrid"></div></section></section>
<section id="badgesView" class="view"><section class="card"><div class="row"><h2>Achievements</h2><button data-view="homeView" class="small">Done</button></div><div id="badgeList" class="list"></div></section></section>
</main>
<dialog id="settingsDialog"><form class="modal" method="dialog"><div class="row"><h2>Settings</h2><button class="small" value="cancel">Done</button></div><label>Goal mode<select id="goalMode"><option value="daily">Same every day</option><option value="weekdayWeekend">Weekday / weekend</option></select></label><label>Daily goal<input id="dailyGoal" type="number"></label><label>Weekday goal<input id="weekdayGoal" type="number"></label><label>Weekend goal<input id="weekendGoal" type="number"></label><label>Theme<select id="theme"><option value="system">System</option><option value="light">Light</option><option value="dark">Dark</option></select></label><div class="actions"><button id="saveSettings" class="primary" type="button">Save</button><button id="exportButton" class="ghost" type="button">Export</button><button id="importButton" class="ghost" type="button">Import</button></div><div class="actions"><button id="developerButton" class="ghost" type="button">Developer Info</button><button id="clearButton" class="ghost danger" type="button">Clear All Data</button></div><div class="privacy"><span id="versionText"></span></div></form></dialog>
<dialog id="cupDialog"><form class="modal" method="dialog"><h2 id="cupTitle">Add Cup</h2><label>Name<input id="cupName"></label><label>Ounces<input id="cupOz" type="number"></label><div class="actions"><button id="saveCup" class="primary" type="button">Save</button><button id="deleteCup" class="ghost danger" type="button">Delete</button><button class="ghost" value="cancel">Cancel</button></div></form></dialog>
<dialog id="dayDialog"><form class="modal" method="dialog"><div class="row"><h2 id="dayTitle">Day</h2><button class="small" value="cancel">Done</button></div><div class="actions"><button id="addPastDrink" class="primary" type="button">+ Drink</button><button id="resetPastDay" class="ghost danger" type="button">Reset Day</button></div><div id="dayList" class="timeline show"></div></form></dialog>
<dialog id="devDialog"><form class="modal" method="dialog"><div class="row"><h2>Developer Info</h2><button class="small" value="cancel">Done</button></div><div id="devInfo" class="list"></div></form></dialog>
<div id="toast" class="toast"></div><div id="confetti" class="confetti"></div>
<script src="v1/js/config.js"></script><script src="v1/js/storage.js"></script><script src="v1/js/date.js"></script><script src="v1/js/hydration.js"></script><script src="v1/js/stats.js"></script><script src="v1/js/engagement.js"></script><script src="v1/js/telemetry.js"></script><script src="v1/js/app.js"></script></body></html>
