<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#eaf7ff">
  <title>Water Tracker</title>
  <style>
    :root{--bg:#f4fbff;--card:#ffffffd9;--text:#102033;--muted:#68798b;--line:#dcecf7;--accent:#0a91e6;--water:#35aef4;--water2:#85d6ff;--danger:#d64545;--success:#19a974;--shadow:0 18px 50px rgba(17,72,112,.14)}
    *{box-sizing:border-box}body{margin:0;min-height:100svh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at 20% 0%,#d8f3ff 0,transparent 28%),linear-gradient(180deg,var(--bg),#edf8ff);color:var(--text);padding:max(18px,env(safe-area-inset-top)) 16px max(20px,env(safe-area-inset-bottom))}.app{max-width:440px;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}h1{font-size:28px;margin:0;letter-spacing:-.04em}.tiny{margin:0 0 2px;color:var(--muted);font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}button,input{font:inherit}button{cursor:pointer;-webkit-tap-highlight-color:transparent}.gear,.small{border:1px solid var(--line);background:white;color:var(--text);border-radius:999px;padding:11px 13px;font-weight:850;box-shadow:0 8px 22px rgba(17,72,112,.08)}.card,.hero{background:var(--card);border:1px solid #fff;border-radius:32px;box-shadow:var(--shadow);backdrop-filter:blur(18px)}.hero{padding:18px;text-align:center}.card{padding:15px;margin-top:14px}.total{display:flex;align-items:baseline;justify-content:center;gap:7px;line-height:1}.num{font-size:50px;font-weight:950;letter-spacing:-.07em}.goal{font-size:18px;color:var(--muted);font-weight:850}.status{margin-top:7px;color:var(--accent);font-weight:950}.bottleArea{height:220px;position:relative;display:grid;place-items:center;margin:8px 0 14px}.neck{position:absolute;top:2px;width:44px;height:34px;border:5px solid var(--text);border-bottom:0;border-radius:14px 14px 0 0;background:#f4fbff;z-index:2}.bottle{position:absolute;bottom:0;width:122px;height:194px;border:5px solid var(--text);border-radius:36px 36px 44px 44px;overflow:hidden;background:linear-gradient(90deg,#ffffffb3,#ffffff22)}.water{position:absolute;left:-5px;right:-5px;bottom:0;height:0%;background:linear-gradient(180deg,var(--water2),var(--water));transition:height .45s cubic-bezier(.2,.8,.2,1)}.water:before{content:"";position:absolute;left:-20%;top:-15px;width:140%;height:30px;border-radius:50%;background:#ffffff88;animation:wave 2.4s ease-in-out infinite}.shine{position:absolute;top:24px;left:18px;width:18px;height:130px;border-radius:999px;background:#ffffff55}.mark{position:absolute;left:0;right:0;top:0;border-top:2px dashed #10203355;z-index:4}@keyframes wave{0%,100%{transform:translateX(-9px)}50%{transform:translateX(9px) translateY(3px)}}.grid,.cups,.history{display:grid;gap:10px}.grid,.cups{grid-template-columns:repeat(3,1fr)}.add{border:0;border-radius:18px;background:var(--text);color:white;padding:15px 8px;font-size:19px;font-weight:950;box-shadow:0 12px 22px rgba(16,32,51,.16)}.add.custom{background:linear-gradient(180deg,#0a91e6,#087ac4)}.add:active,.cup:active,.undo:active,.small:active,.gear:active{transform:scale(.98)}.row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}h2{font-size:17px;margin:0;letter-spacing:-.03em}.cup{min-height:62px;border:1px solid var(--line);border-radius:18px;background:white;color:var(--text);padding:10px 8px;font-weight:950;box-shadow:0 8px 18px rgba(17,72,112,.07)}.cup span{display:block;margin-top:3px;font-size:12px;color:var(--muted);font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.hint{margin:10px 2px 0;color:var(--muted);font-size:12px;line-height:1.35}.undo{width:100%;margin-top:14px;border:1px solid #ffd0d0;border-radius:24px;background:#fff2f2;color:var(--danger);padding:18px 14px;font-weight:950;font-size:18px}.undo:disabled{opacity:.5;color:var(--muted);background:#f5f8fb;border-color:var(--line)}.history{grid-template-columns:repeat(7,1fr);margin-top:12px}.day{min-height:62px;border:1px solid var(--line);border-radius:16px;background:white;display:grid;place-items:center;padding:7px 2px;text-align:center}.day.met{border-color:#9ee8cd;background:#eafff7}.day.today{outline:2px solid #8bd5ff}.dow{color:var(--muted);font-size:11px;font-weight:900}.oz{font-size:14px;font-weight:950;margin-top:4px}.avg{font-size:13px;color:var(--muted);font-weight:850}.toast{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(84px);opacity:0;pointer-events:none;background:var(--text);color:white;padding:12px 16px;border-radius:999px;font-weight:900;box-shadow:var(--shadow);transition:.25s}.toast.show{transform:translateX(-50%) translateY(0);opacity:1}@media(max-height:720px){.num{font-size:40px}.bottleArea{height:185px}.bottle{height:160px;width:108px}.hero{padding:14px}.card{padding:13px}}
  </style>
</head>
<body>
  <main class="app">
    <header class="top"><div><p class="tiny">Today</p><h1>Water Tracker</h1></div><button class="gear" id="settings">⚙️</button></header>
    <section class="hero">
      <div class="total"><span class="num" id="total">0</span><span class="goal">/ <span id="goal">120</span> oz</span></div>
      <div class="status" id="status">0% complete</div>
      <div class="bottleArea"><div class="neck"></div><div class="bottle"><div class="mark"></div><div class="water" id="water"></div><div class="shine"></div></div></div>
      <div class="grid" id="quick"></div>
    </section>
    <section class="card"><div class="row"><h2>My Cups</h2><button class="small" id="addCup">+ Add Cup</button></div><div class="cups" id="cups"></div><p class="hint">Tap a cup to log it. Use “Edit Cups” later; for now, clear bad cups in Settings.</p></section>
    <button class="undo" id="undo" disabled>↶ Undo last drink</button>
    <section class="card"><div class="row"><h2>Last 7 Days</h2><span class="avg" id="avg">Avg 0 oz</span></div><div class="history" id="history"></div></section>
  </main>
  <div class="toast" id="toast"></div>
<script>
const KEY='waterTracker_v1';
const quick=[8,12,16,20,30];
const defaults={goal:120,cups:[{name:'Owala',oz:24},{name:'Mug',oz:12},{name:'Stanley',oz:40}],days:{}};
let state=load();
function load(){try{const s=JSON.parse(localStorage.getItem(KEY));return s?{...defaults,...s,cups:s.cups?.length?s.cups:defaults.cups,days:s.days||{}}:structuredClone(defaults)}catch{return structuredClone(defaults)}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function dayKey(d=new Date()){const local=new Date(d.getTime()-d.getTimezoneOffset()*60000);return local.toISOString().slice(0,10)}
function today(){const k=dayKey();if(!state.days[k])state.days[k]={drinks:[]};return state.days[k]}
function total(k=dayKey()){return(state.days[k]?.drinks||[]).reduce((s,d)=>s+Number(d.oz||0),0)}
function add(oz,label='Quick add'){oz=Number(oz);if(!oz||oz<1)return;today().drinks.push({oz,label,at:new Date().toISOString()});save();render();navigator.vibrate?.(20);toast(total()>=state.goal?`Goal hit: ${total()} oz`:`Added ${oz} oz`)}
function undo(){const d=today().drinks.pop();if(!d)return;save();render();toast(`Undid ${d.oz} oz`)}
function customAmount(){const input=prompt('How many ounces do you want to add?');if(input===null)return;const oz=Number(input);if(!oz||oz<1){alert('Enter a valid ounce amount.');return}add(oz,'Custom amount')}
function addCup(){const name=prompt('Cup name? Example: Owala');if(name===null)return;const oz=Number(prompt('How many ounces? Example: 24'));if(!name.trim()||!oz||oz<1){alert('Enter a cup name and a valid ounce amount.');return}state.cups.push({name:name.trim(),oz});save();render();toast('Cup added')}
function settings(){const goal=Number(prompt('Daily goal in ounces:',state.goal));if(goal&&goal>0){state.goal=goal;save();render();toast('Goal saved')}const clear=confirm('Do you want to reset custom cups back to default? Press Cancel to keep them.');if(clear){state.cups=structuredClone(defaults.cups);save();render();toast('Cups reset')}}
function render(){today();const t=total();const pctRaw=t/state.goal*100;const pct=Math.min(100,Math.round(pctRaw));document.getElementById('total').textContent=t;document.getElementById('goal').textContent=state.goal;document.getElementById('status').textContent=`${Math.round(pctRaw)}% complete`;document.getElementById('water').style.height=pct+'%';const q=document.getElementById('quick');q.innerHTML='';quick.forEach(oz=>{const b=document.createElement('button');b.className='add';b.textContent='+'+oz;b.onclick=()=>add(oz);q.appendChild(b)});const cst=document.createElement('button');cst.className='add custom';cst.textContent='+ Custom';cst.onclick=customAmount;q.appendChild(cst);const cups=document.getElementById('cups');cups.innerHTML='';state.cups.forEach(c=>{const b=document.createElement('button');b.className='cup';b.innerHTML=`+${esc(c.oz)}<span>${esc(c.name)}</span>`;b.onclick=()=>add(c.oz,c.name);cups.appendChild(b)});const last=today().drinks.at(-1);const u=document.getElementById('undo');u.disabled=!last;u.textContent=last?`↶ Undo +${last.oz} oz`:'↶ Undo last drink';const h=document.getElementById('history');h.innerHTML='';let sum=0;for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=dayKey(d);const oz=total(k);sum+=oz;const el=document.createElement('div');el.className='day'+(oz>=state.goal?' met':'')+(k===dayKey()?' today':'');el.innerHTML=`<div><div class="dow">${d.toLocaleDateString(undefined,{weekday:'short'})}</div><div class="oz">${oz}</div></div>`;h.appendChild(el)}document.getElementById('avg').textContent=`Avg ${Math.round(sum/7)} oz`}
function esc(v){return String(v).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
let timer;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(timer);timer=setTimeout(()=>t.classList.remove('show'),1300)}
document.getElementById('addCup').onclick=addCup;document.getElementById('settings').onclick=settings;document.getElementById('undo').onclick=undo;render();
</script>
</body>
</html>
