<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#eaf7ff">
<title>Water Tracker</title>
<style>
:root{--bg:#f4fbff;--card:#ffffffdc;--text:#102033;--muted:#68798b;--line:#dcecf7;--accent:#0a91e6;--accent2:#77d0ff;--water:#35aef4;--danger:#d64545;--success:#19a974;--shadow:0 18px 50px rgba(17,72,112,.14)}[data-theme=dark]{--bg:#07131f;--card:#102033dd;--text:#eef8ff;--muted:#9db0c3;--line:#29465f;--accent:#77d0ff;--accent2:#2b9de0;--water:#3bb8ff;--shadow:0 18px 60px rgba(0,0,0,.36)}*{box-sizing:border-box}body{margin:0;min-height:100svh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at 20% 0%,rgba(119,208,255,.42),transparent 28%),linear-gradient(180deg,var(--bg),color-mix(in srgb,var(--bg),#dcefff 28%));color:var(--text);padding:max(18px,env(safe-area-inset-top)) 16px max(22px,env(safe-area-inset-bottom))}button,input,select{font:inherit}button{cursor:pointer;-webkit-tap-highlight-color:transparent}.app{max-width:440px;margin:0 auto}.update{display:none;align-items:center;justify-content:space-between;gap:10px;background:#102033;color:white;border-radius:18px;padding:11px 12px;margin-bottom:12px;box-shadow:var(--shadow);font-weight:850}.update.show{display:flex}.update button{border:0;background:white;color:#102033;border-radius:999px;padding:8px 11px;font-weight:900}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.tiny{margin:0 0 2px;color:var(--muted);font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}h1{font-size:28px;margin:0;letter-spacing:-.04em}h2{font-size:17px;margin:0;letter-spacing:-.03em}.gear,.small,.ghost{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:999px;padding:11px 13px;font-weight:850;box-shadow:0 8px 22px rgba(17,72,112,.08)}.hero,.card{background:var(--card);border:1px solid rgba(255,255,255,.58);border-radius:32px;box-shadow:var(--shadow);backdrop-filter:blur(18px)}.hero{padding:18px;text-align:center}.card{padding:15px;margin-top:14px}.total{display:flex;align-items:baseline;justify-content:center;gap:7px;line-height:1}.num{font-size:50px;font-weight:950;letter-spacing:-.07em}.goal{font-size:18px;color:var(--muted);font-weight:850}.status{margin-top:7px;color:var(--accent);font-weight:950}.bottleArea{height:220px;position:relative;display:grid;place-items:center;margin:8px 0 14px}.neck{position:absolute;top:2px;width:44px;height:34px;border:5px solid var(--text);border-bottom:0;border-radius:14px 14px 0 0;background:var(--bg);z-index:2}.bottle{position:absolute;bottom:0;width:122px;height:194px;border:5px solid var(--text);border-radius:36px 36px 44px 44px;overflow:hidden;background:linear-gradient(90deg,rgba(255,255,255,.72),rgba(255,255,255,.13))}.water{position:absolute;left:-5px;right:-5px;bottom:0;height:0%;background:linear-gradient(180deg,var(--accent2),var(--water));transition:height .45s cubic-bezier(.2,.8,.2,1)}.water:before{content:"";position:absolute;left:-20%;top:-15px;width:140%;height:30px;border-radius:50%;background:rgba(255,255,255,.52);animation:wave 2.4s ease-in-out infinite}.shine{position:absolute;top:24px;left:18px;width:18px;height:130px;border-radius:999px;background:rgba(255,255,255,.32);z-index:3}.mark{position:absolute;left:0;right:0;top:0;border-top:2px dashed color-mix(in srgb,var(--text),transparent 55%);z-index:4}@keyframes wave{0%,100%{transform:translateX(-9px)}50%{transform:translateX(9px) translateY(3px)}}@keyframes pop{0%{transform:scale(.98)}55%{transform:scale(1.025)}100%{transform:scale(1)}}.celebrate{animation:pop .45s ease}.grid,.cups,.history{display:grid;gap:10px}.grid,.cups{grid-template-columns:repeat(3,1fr)}.add{border:0;border-radius:18px;background:var(--text);color:var(--bg);padding:15px 8px;font-size:19px;font-weight:950;box-shadow:0 12px 22px rgba(16,32,51,.16);min-height:58px}.add.custom{background:linear-gradient(180deg,var(--accent),#087ac4);color:white}.add:active,.cup:active,.undo:active,.small:active,.gear:active,.primary:active,.ghost:active{transform:scale(.98)}.row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.cup{min-height:62px;border:1px solid var(--line);border-radius:18px;background:var(--card);color:var(--text);padding:10px 8px;font-weight:950;box-shadow:0 8px 18px rgba(17,72,112,.07)}.cup span{display:block;margin-top:3px;font-size:12px;color:var(--muted);font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.hint{margin:10px 2px 0;color:var(--muted);font-size:12px;line-height:1.35}.undo{width:100%;margin-top:14px;border:1px solid color-mix(in srgb,var(--danger),white 65%);border-radius:24px;background:color-mix(in srgb,var(--danger),white 89%);color:var(--danger);padding:18px 14px;font-weight:950;font-size:18px}.undo:disabled{opacity:.5;color:var(--muted);background:color-mix(in srgb,var(--card),var(--bg) 30%);border-color:var(--line)}.history{grid-template-columns:repeat(7,1fr);margin-top:12px}.day{min-height:62px;border:1px solid var(--line);border-radius:16px;background:var(--card);display:grid;place-items:center;padding:7px 2px;text-align:center}.day.met{border-color:#9ee8cd;background:color-mix(in srgb,var(--success),white 88%)}[data-theme=dark] .day.met{background:color-mix(in srgb,var(--success),#102033 74%)}.day.today{outline:2px solid var(--accent2)}.dow{color:var(--muted);font-size:11px;font-weight:900}.oz{font-size:14px;font-weight:950;margin-top:4px}.avg{font-size:13px;color:var(--muted);font-weight:850}.timeline{display:none;margin-top:12px;border-top:1px solid var(--line);padding-top:10px}.timeline.show{display:block}.drink{display:flex;justify-content:space-between;gap:8px;padding:8px 2px;color:var(--muted);font-weight:800}.drink strong{color:var(--text)}dialog{border:0;border-radius:28px;padding:0;width:min(380px,calc(100vw - 28px));background:var(--card);color:var(--text);box-shadow:0 24px 90px rgba(0,0,0,.28)}dialog::backdrop{background:rgba(5,18,31,.48)}.modal{padding:18px}.modal label{display:grid;gap:6px;margin-top:13px;color:var(--muted);font-size:13px;font-weight:900}.modal input,.modal select{width:100%;border:1px solid var(--line);border-radius:16px;padding:13px 12px;background:var(--bg);color:var(--text);font-size:17px}.actions{display:flex;gap:10px;margin-top:16px}.actions button{flex:1}.primary{border:0;background:var(--accent);color:white;border-radius:999px;padding:12px 13px;font-weight:900}.ghost{box-shadow:none}.toast{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(84px);opacity:0;pointer-events:none;background:var(--text);color:var(--bg);padding:12px 16px;border-radius:999px;font-weight:900;box-shadow:var(--shadow);transition:.25s}.toast.show{transform:translateX(-50%) translateY(0);opacity:1}.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden}.dot{position:absolute;top:-12px;width:8px;height:12px;border-radius:3px;background:var(--accent);animation:fall .9s ease forwards}@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.2}}@media(max-height:720px){.num{font-size:40px}.bottleArea{height:185px}.bottle{height:160px;width:108px}.hero{padding:14px}.card{padding:13px}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<main class="app">
  <div class="update" id="updateBanner"><span>🚀 New version available</span><button id="updateNow">Update</button></div>
  <header class="top"><div><p class="tiny">Today</p><h1>Water Tracker</h1></div><button class="gear" id="settings">⚙️</button></header>
  <section class="hero" id="hero"><div class="total"><span class="num" id="total">0</span><span class="goal">/ <span id="goal">120</span> oz</span></div><div class="status" id="status">0% complete</div><div class="bottleArea"><div class="neck"></div><div class="bottle"><div class="mark"></div><div class="water" id="water"></div><div class="shine"></div></div></div><div class="grid" id="quick"></div></section>
  <section class="card"><div class="row"><h2>My Cups</h2><button class="small" id="addCup">+ Add Cup</button></div><div class="cups" id="cups"></div><p class="hint">Tap a cup to log it. Tap Edit Cups to rename, resize, or delete.</p></section>
  <button class="undo" id="undo" disabled>↶ Undo last drink</button>
  <section class="card"><div class="row"><h2>Last 7 Days</h2><span class="avg" id="avg">Avg 0 oz</span></div><div class="history" id="history"></div></section>
  <section class="card"><div class="row"><h2>Today’s Drinks</h2><button class="small" id="toggleTimeline">Show</button></div><div class="timeline" id="timeline"></div></section>
</main>
<dialog id="amountDialog"><form class="modal" method="dialog"><h2 id="amountTitle">Add custom amount</h2><label>Ounces<input id="amountInput" type="number" inputmode="decimal" min="0" step="0.5" placeholder="24"></label><div class="actions"><button class="ghost" value="cancel">Cancel</button><button class="primary" id="saveAmount" value="default">Add</button></div></form></dialog>
<dialog id="cupDialog"><form class="modal" method="dialog"><h2 id="cupTitle">Add Cup</h2><label>Name<input id="cupName" maxlength="18" placeholder="Owala"></label><label>Ounces<input id="cupOz" type="number" inputmode="decimal" min="0" step="0.5" placeholder="24"></label><div class="actions"><button class="ghost" value="cancel">Cancel</button><button class="primary" id="saveCup" value="default">Save</button></div><div class="actions"><button class="ghost" id="deleteCup" value="delete" style="display:none;color:var(--danger)">Delete Cup</button></div></form></dialog>
<dialog id="settingsDialog"><form class="modal" method="dialog"><h2>Settings</h2><label>Daily goal, oz<input id="goalInput" type="number" inputmode="numeric" min="1" max="400"></label><label>Theme<select id="themeInput"><option value="system">System</option><option value="light">Light</option><option value="dark">Dark</option></select></label><div class="actions"><button class="ghost" value="cancel">Cancel</button><button class="primary" id="saveSettings" value="default">Save</button></div><div class="actions"><button class="ghost" id="editCups" value="edit">Edit Cups</button></div></form></dialog>
<div class="toast" id="toast"></div><div class="confetti" id="confetti"></div>
<script>
const APP_VERSION='2026-06-22.4';
const KEY='waterTracker_v1',quick=[8,12,16,20,30],defaults={goal:120,theme:'system',cups:[{id:'owala',name:'Owala',oz:24},{id:'mug',name:'Mug',oz:12},{id:'stanley',name:'Stanley',oz:40}],days:{}};
let state=load(),editingCupId=null,amountMode='custom',timelineOpen=false;
function uid(){return crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random())}
function load(){try{const s=JSON.parse(localStorage.getItem(KEY));let x=s?{...defaults,...s,cups:s.cups?.length?s.cups:defaults.cups,days:s.days||{}}:structuredClone(defaults);x.cups=x.cups.map(c=>({...c,id:c.id||uid()}));return x}catch{return structuredClone(defaults)}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function dayKey(d=new Date()){const local=new Date(d.getTime()-d.getTimezoneOffset()*60000);return local.toISOString().slice(0,10)}
function today(){const k=dayKey();if(!state.days[k])state.days[k]={drinks:[]};return state.days[k]}
function drinks(k=dayKey()){return state.days[k]?.drinks||[]}
function total(k=dayKey()){return drinks(k).reduce((s,d)=>s+Number(d.oz||0),0)}
function add(oz,label='Quick add'){oz=Number(oz);if(!oz||oz<1)return;const before=total();today().drinks.push({id:uid(),oz,label,at:new Date().toISOString()});save();render();navigator.vibrate?.(20);const after=total();if(before<state.goal&&after>=state.goal){toast(`Goal hit: ${after} oz`);celebrate()}else toast(`Added ${oz} oz`)}
function undo(){const d=today().drinks.pop();if(!d)return;save();render();toast(`Undid ${d.oz} oz`)}
function openAmount(){amountMode='custom';document.getElementById('amountTitle').textContent='Add custom amount';document.getElementById('amountInput').value='';document.getElementById('amountDialog').showModal();setTimeout(()=>document.getElementById('amountInput').focus(),60)}
function saveAmount(e){const oz=Number(document.getElementById('amountInput').value);if(!oz||oz<1){e.preventDefault();alert('Enter a valid ounce amount.');return}add(oz,'Custom amount')}
function openCup(id=null){editingCupId=id;const c=state.cups.find(x=>x.id===id);document.getElementById('cupTitle').textContent=c?'Edit Cup':'Add Cup';document.getElementById('cupName').value=c?.name||'';document.getElementById('cupOz').value=c?.oz||'';document.getElementById('deleteCup').style.display=c?'block':'none';document.getElementById('cupDialog').showModal();setTimeout(()=>document.getElementById('cupName').focus(),60)}
function saveCup(e){const name=document.getElementById('cupName').value.trim(),oz=Number(document.getElementById('cupOz').value);if(!name||!oz||oz<1){e.preventDefault();alert('Enter a cup name and valid ounce amount.');return}if(editingCupId){const c=state.cups.find(x=>x.id===editingCupId);if(c){c.name=name;c.oz=oz;toast('Cup updated')}}else{state.cups.push({id:uid(),name,oz});toast('Cup added')}save();setTimeout(render,0)}
function deleteCup(e){e.preventDefault();if(!editingCupId)return;const c=state.cups.find(x=>x.id===editingCupId);if(c&&confirm(`Delete ${c.name}?`)){state.cups=state.cups.filter(x=>x.id!==editingCupId);save();document.getElementById('cupDialog').close();render();toast('Cup deleted')}}
function openSettings(){document.getElementById('goalInput').value=state.goal;document.getElementById('themeInput').value=state.theme||'system';document.getElementById('settingsDialog').showModal()}
function saveSettings(e){const goal=Number(document.getElementById('goalInput').value);if(!goal||goal<1){e.preventDefault();alert('Enter a valid daily goal.');return}state.goal=goal;state.theme=document.getElementById('themeInput').value;save();applyTheme();setTimeout(render,0);toast('Settings saved')}
function editCups(e){e.preventDefault();document.getElementById('settingsDialog').close();toast('Tap any cup to edit for 5 seconds');document.querySelectorAll('.cup').forEach(b=>b.classList.add('editmode'));window.editingCups=true;setTimeout(()=>{window.editingCups=false;render()},5000)}
function applyTheme(){const pref=matchMedia('(prefers-color-scheme:dark)').matches;document.documentElement.dataset.theme=(state.theme||'system')==='system'?(pref?'dark':'light'):state.theme}
function render(){today();const t=total(),pctRaw=t/state.goal*100,pct=Math.min(100,Math.round(pctRaw));document.getElementById('total').textContent=t;document.getElementById('goal').textContent=state.goal;document.getElementById('status').textContent=`${Math.round(pctRaw)}% complete`;document.getElementById('water').style.height=pct+'%';const q=document.getElementById('quick');q.innerHTML='';quick.forEach(oz=>{const b=document.createElement('button');b.className='add';b.textContent='+'+oz;b.onclick=()=>add(oz);q.appendChild(b)});const cst=document.createElement('button');cst.className='add custom';cst.textContent='+ Custom';cst.onclick=openAmount;q.appendChild(cst);const cups=document.getElementById('cups');cups.innerHTML='';state.cups.forEach(c=>{const b=document.createElement('button');b.className='cup';b.innerHTML=`+${esc(c.oz)}<span>${esc(c.name)}</span>`;b.onclick=()=>window.editingCups?openCup(c.id):add(c.oz,c.name);b.oncontextmenu=e=>{e.preventDefault();openCup(c.id)};cups.appendChild(b)});const last=today().drinks.at(-1),u=document.getElementById('undo');u.disabled=!last;u.textContent=last?`↶ Undo +${last.oz} oz`:'↶ Undo last drink';renderHistory();renderTimeline()}
function renderHistory(){const h=document.getElementById('history');h.innerHTML='';let sum=0;for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=dayKey(d),oz=total(k);sum+=oz;const el=document.createElement('div');el.className='day'+(oz>=state.goal?' met':'')+(k===dayKey()?' today':'');el.innerHTML=`<div><div class="dow">${d.toLocaleDateString(undefined,{weekday:'short'})}</div><div class="oz">${oz}</div></div>`;h.appendChild(el)}document.getElementById('avg').textContent=`Avg ${Math.round(sum/7)} oz`}
function renderTimeline(){const box=document.getElementById('timeline'),btn=document.getElementById('toggleTimeline');box.className='timeline'+(timelineOpen?' show':'');btn.textContent=timelineOpen?'Hide':'Show';box.innerHTML='';const ds=[...drinks()].reverse();if(!ds.length){box.innerHTML='<div class="drink">No drinks logged yet</div>';return}ds.forEach(d=>{const time=new Date(d.at).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});const row=document.createElement('div');row.className='drink';row.innerHTML=`<span>${time} · ${esc(d.label||'Drink')}</span><strong>+${esc(d.oz)} oz</strong>`;box.appendChild(row)})}
function celebrate(){document.getElementById('hero').classList.remove('celebrate');void document.getElementById('hero').offsetWidth;document.getElementById('hero').classList.add('celebrate');navigator.vibrate?.([25,40,25]);const wrap=document.getElementById('confetti');wrap.innerHTML='';for(let i=0;i<24;i++){const d=document.createElement('div');d.className='dot';d.style.left=Math.random()*100+'vw';d.style.background=['#35aef4','#19a974','#ffd166','#ef476f'][i%4];d.style.animationDelay=Math.random()*0.25+'s';wrap.appendChild(d)}setTimeout(()=>wrap.innerHTML='',1200)}
function esc(v){return String(v).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
let timer;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(timer);timer=setTimeout(()=>t.classList.remove('show'),1400)}
async function checkForUpdate(){try{const res=await fetch(location.pathname+'?check='+Date.now(),{cache:'no-store'}),txt=await res.text(),m=txt.match(/APP_VERSION='([^']+)'/);if(m&&m[1]!==APP_VERSION)document.getElementById('updateBanner').classList.add('show')}catch{}}
document.getElementById('addCup').onclick=()=>openCup();document.getElementById('settings').onclick=openSettings;document.getElementById('undo').onclick=undo;document.getElementById('saveAmount').onclick=saveAmount;document.getElementById('saveCup').onclick=saveCup;document.getElementById('deleteCup').onclick=deleteCup;document.getElementById('saveSettings').onclick=saveSettings;document.getElementById('editCups').onclick=editCups;document.getElementById('toggleTimeline').onclick=()=>{timelineOpen=!timelineOpen;renderTimeline()};document.getElementById('updateNow').onclick=()=>location.reload();matchMedia('(prefers-color-scheme:dark)').addEventListener('change',applyTheme);applyTheme();render();setTimeout(checkForUpdate,800);
</script>
</body>
</html>
